apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: voistra-server
  namespace: voistra
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: voistra-server
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
