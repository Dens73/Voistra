apiVersion: apps/v1
kind: Deployment
metadata:
  name: voistra-server
  namespace: voistra
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voistra-server
  template:
    metadata:
      labels:
        app: voistra-server
    spec:
      containers:
        - name: server
          image: ghcr.io/example/voistra-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: voistra-server-config
            - secretRef:
                name: voistra-server-secret
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 6
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 20
