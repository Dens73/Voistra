name: diploma_voip

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diploma_server
    restart: unless-stopped
    env_file:
      - ./apps/server/.env
    depends_on:
      - postgres
      - redis
    environment:
      HOST: 0.0.0.0
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: diploma_voip
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SYNCHRONIZE: "false"
      DB_MIGRATIONS_RUN: "true"
      TURN_URL: turn:${PUBLIC_HOST:-127.0.0.1}:3478
      TURN_USERNAME: demo
      TURN_PASSWORD: demo
      REDIS_URL: redis://redis:6379
    ports:
      - "3001:3000"

  postgres:
    image: postgres:16-alpine
    container_name: diploma_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: diploma_voip
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: diploma_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data

  coturn:
    image: coturn/coturn:4.6.3
    container_name: diploma_coturn
    restart: unless-stopped
    command:
      - --no-cli
      - --log-file=stdout
      - --realm=${PUBLIC_HOST:-localhost}
      - --listening-port=3478
      - --external-ip=${PUBLIC_IP:-127.0.0.1}
      - --fingerprint
      - --lt-cred-mech
      - --user=demo:demo
      - --min-port=49160
      - --max-port=49200
    ports:
      - "3478:3478"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"

volumes:
  postgres_data:
  redis_data:
